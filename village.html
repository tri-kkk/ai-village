<style>

  body{margin:0;background:#14181f;color:#e6e9ef;font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;}

  .banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(40,52,70,.92);color:#dbe6ff;font-size:12px;padding:5px 12px;border-radius:20px;white-space:nowrap;}

  button{background:#1f2630;color:#e6e9ef;border:1px solid #2c3543;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
  button:hover{background:#28313d;}
  .feed{background:#0f1319;border:1px solid #232a35;border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.7;min-height:120px;}
  .feed .who{font-weight:600;}
  .chron{background:#0f1319;border:1px solid #2c3543;border-radius:12px;padding:14px 16px;margin-top:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;display:none;}

":null},{"name":"서연","job":"시장","x":2,"y":2,"say":"미나님, 안녕하세요. 요즘 빵집 장사는 어떠신가요? 마을 분위기가 어떤지 여쭤보고 싶었어요.","action":"방문","target":"미나"},{"name":"가람","job":"의사","x":13,"y":7,"say":"","action":"진료실 정리를 계속하며 문을 닫는다","target":null}]},{"tick":3,"event":"먹구름이 몰려오더니 마을에 비가 쏟아진다.","agents":[{"name":"미나","job":"빵집 주인","x":13,"y":10,"say":"서연님! 이런 날씨에 시청까지 다녀가셨네요. 그런데 요즘 선거 얘기들이 많던데, 정말로 좋은 후보들이 나올 거 같아요?","action":"우산을 들고 시청으로 향하며 서연 시장을 찾는다","target":"서연"},{"name":"준호","job":"우체부","x":2,"y":2,"say":"","action":"편지 정렬","target":null},{"name":"옥자","job":"술집 사장","x":13,"y":10,"say":"어라, 미나님! 서연 시장님까지! 이런 빗속에 모여 있네. 요즘 선거 얘기로 마을이 들썩이던데, 혹시 뭔가 더 알려줄 게 있어요?","action":"우산을 펴고 시청 쪽으로 걸어가며","target":"미나"},{"name":"동수","job":"농부","x":7,"y":10,"say":"옥자, 집에 없네. 빗속을 헤맸나.","action":"술집 문을 열고 들어간다","target":null},{"name":"서연","job":"시장","x":8,"y":5,"say":"비가 많이 오네요. 모두 안전하게 집으로 돌아가시길 바랍니다. 저도 주민분들 안전이 최우선입니다.","action":"우산을 펴고 광장으로 나가 주민들과 마주친다","target":"미나"},{"name":"가람","job":"의사","x":13,"y":7,"say":"","action":"진료실 문을 잠그고 창밖을 본다","target":null}]}],"chronicle":"## 이번 시즌 이야기\n한 달 뒤 시장 선거를 앞두고 마을이 술렁거린다. 미나의 빵집, 옥자의 소문 수집, 준호의 편지 배달—모두가 선거 소식의 물꼬를 틀고 있다. 현직 시장 서연은 주민 접촉으로 분위기를 재고 있고, 동수는 술집 깊숙이 몸을 숨긴다. 비 오는 T3, 광장과 시청에서 마을의 진정한 심장이 뛰기 시작한다.\n\n## 화제의 인물\n**옥자** — 마을의 정보 허브. T1부터 T3까지 미나, 서연과 연이어 접촉하며 선거 정보를 능동적으로 수집하고 배포한다. 소문의 중심에서 마을을 읽는다.\n\n## 사건 TOP3\n1. **T1 광장 집결** — 미나, 옥자, 동수, 준호, 서연이 동시다발로 광장에 나타나 선거 소식을 감지하는 모습. 마을 전체가 선거 모드로 전환되다.\n2. **T2 정보전** — 옥자가 시청으로 이동해 서연에게 질문하고, 서연이 역으로 미나를 방문하는 등 주도권 다툼이 시작되다.\n3. **T3 비 오는 광장의 만남** — 미나, 옥자, 서연이 비 속에서 우연히(?) 만나 선거를 직접 거론하며 마을의 갈라진 진심이 드러나다."}</script>
